apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-pv
  labels:
    app: prometheus-pv                        
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain       
  storageClassName: local-path
  hostPath:
    path: /persistentvolume/prometheus
    type: DirectoryOrCreate                  
  nodeAffinity:                               
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists               

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "58.4.0"
    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: "admin123"
          service:
            type: ClusterIP
          persistence:                        
            enabled: true
            storageClassName: local-path
            size: 1Gi
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-gateway.observability.svc.cluster.local
              access: proxy
            - name: Tempo
              type: tempo
              url: http://tempo.observability.svc.cluster.local:3100
              access: proxy
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  folder: ''
                  type: file
                  disableDeletion: false      
                  editable: true             
                  options:
                    path: /var/lib/grafana/dashboards/default
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            retention: 15d                   
            retentionSize: "9GB"             
            resources:
              requests:
                memory: 400Mi              
                cpu: 150m
              limits:
                memory: 800Mi              
                cpu: 400m
            storageSpec:
              volumeClaimTemplate:
                metadata:
                  name: prometheus-db        
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: local-path
                  selector:
                    matchLabels:
                      app: prometheus-pv     
                  resources:
                    requests:
                      storage: 10Gi          
        alertmanager:
          enabled: false
        kubeEtcd:                            
          enabled: false
        kubeControllerManager:              
          enabled: false
        kubeScheduler:                      
          enabled: false
        kubeProxy:                          
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true